<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩🥗 POOP SALAD - The Restaurant Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a05;font-family:'Courier New',monospace}
canvas{display:block;margin:0 auto;touch-action:none}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;display:flex;justify-content:space-between;padding:6px 12px;z-index:10}
.hud-box{text-align:center;background:rgba(0,0,0,0.6);border-radius:8px;padding:4px 10px;border:1px solid #4a3020}
.hud-label{font-size:9px;color:#a08060;text-transform:uppercase;letter-spacing:1px}
.hud-val{font-size:16px;font-weight:800;color:#ffd700}
#order-queue{position:absolute;top:50px;right:8px;pointer-events:none;z-index:10;display:flex;flex-direction:column;gap:4px}
.order-ticket{background:rgba(255,240,200,0.9);color:#2a1a0a;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;border-left:3px solid #ff6b35;max-width:140px;font-family:'Courier New',monospace}
.order-ticket.urgent{border-left-color:#ff0000;animation:ticketPulse 0.5s infinite}
@keyframes ticketPulse{0%,100%{opacity:1}50%{opacity:0.6}}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(26,10,5,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:20;text-align:center}
#overlay.hidden{display:none}
#overlay h1{font-size:36px;color:#ffd700;text-shadow:0 0 20px #ff6b35;margin-bottom:4px}
#overlay .sub{color:#a08060;font-size:13px;margin-bottom:20px;padding:0 20px;line-height:1.4}
.btn{background:linear-gradient(135deg,#8B4513,#D2691E);color:#ffd700;border:2px solid #ffd700;padding:12px 36px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;pointer-events:auto;margin:6px;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:2px}
.btn:active{transform:scale(0.95);background:linear-gradient(135deg,#D2691E,#8B4513)}
.btn.small{padding:8px 20px;font-size:12px}
#level-title{color:#ff6b35;font-size:18px;margin:8px 0}
#recipe-panel{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);pointer-events:auto;z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:95%}
#recipe-panel.hidden{display:none}
.ingr-btn{width:52px;height:52px;border-radius:10px;border:2px solid #4a3020;background:#2a1a0a;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s,border-color 0.2s;position:relative}
.ingr-btn:active{transform:scale(0.9)}
.ingr-btn.selected{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.4)}
.ingr-btn .ingr-name{position:absolute;bottom:-14px;font-size:7px;color:#a08060;white-space:nowrap}
#serve-btn{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);pointer-events:auto;z-index:10;display:none}
#serve-btn.show{display:block}
#mobile-dpad{position:absolute;bottom:80px;left:15px;pointer-events:auto;z-index:10;display:none}
.dpad-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:#ffd700;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:absolute}
.dpad-btn:active{background:rgba(255,215,0,0.35)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="hud-box"><div class="hud-label">Level</div><div class="hud-val" id="h-level">1</div></div>
  <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="h-score">0</div></div>
  <div class="hud-box"><div class="hud-label">Tips</div><div class="hud-val" id="h-tips">$0</div></div>
  <div class="hud-box"><div class="hud-label">Served</div><div class="hud-val" id="h-served">0/5</div></div>
</div>
<div id="order-queue"></div>
<div id="recipe-panel" class="hidden"></div>
<button class="btn" id="serve-btn" style="display:none">🍽️ SERVE IT</button>
<div id="mobile-dpad">
  <div class="dpad-btn" style="left:22px;top:0" data-dir="up">▲</div>
  <div class="dpad-btn" style="left:0;top:22px" data-dir="left">◀</div>
  <div class="dpad-btn" style="left:44px;top:22px" data-dir="right">▶</div>
  <div class="dpad-btn" style="left:22px;top:44px" data-dir="down">▼</div>
</div>
<div id="overlay">
  <h1>💩🥗 POOP SALAD</h1>
  <div class="sub">Welcome to the worst restaurant in town!<br>Cook poop salads, dodge obstacles, serve horrified customers!</div>
  <div id="level-title"></div>
  <button class="btn" id="btn-play">START SHIFT</button>
  <div id="end-stats" style="color:#a08060;font-size:12px;margin-top:10px"></div>
</div>
<script>
(()=>{
'use strict';

// === AUDIO ENGINE (retro 8-bit/16-bit style) ===
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ensureAudio(){if(!actx){actx=new AudioCtx();if(actx.state==='suspended')actx.resume()}}
function playTone(f,d=0.1,t='square',v=0.1){if(!actx)return;try{const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}}

// Retro sound library
function sndStep(){playTone(180,0.04,'square',0.04)}
function sndPickup(){playTone(440,0.06);setTimeout(()=>playTone(660,0.06),40);setTimeout(()=>playTone(880,0.08),80)}
function sndServe(){playTone(523,0.08);setTimeout(()=>playTone(659,0.08),60);setTimeout(()=>playTone(784,0.08),120);setTimeout(()=>playTone(1047,0.15),180)}
function sndHorror(){playTone(200,0.15,'sawtooth',0.08);setTimeout(()=>playTone(150,0.2,'sawtooth',0.06),100)}
function sndFart(){// Classic fart: descending noise
  if(!actx)return;try{const o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
  o.type='sawtooth';o.frequency.setValueAtTime(150,actx.currentTime);o.frequency.exponentialRampToValueAtTime(60,actx.currentTime+0.4);
  f.type='lowpass';f.frequency.value=300;g.gain.setValueAtTime(0.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);
  o.connect(f);f.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.5)}catch(e){}}
function sndBark(){playTone(400,0.05,'square',0.08);setTimeout(()=>playTone(500,0.05,'square',0.08),60);setTimeout(()=>playTone(350,0.1,'square',0.06),120)}
function sndBubble(){playTone(800+Math.random()*400,0.08,'sine',0.04)}
function sndCashRegister(){playTone(1200,0.03);setTimeout(()=>playTone(1500,0.03),30);setTimeout(()=>playTone(1800,0.05),60);setTimeout(()=>playTone(2400,0.1),90)}
function sndLevelUp(){for(let i=0;i<6;i++)setTimeout(()=>playTone(400+i*100,0.1,'square',0.07),i*80)}
function sndGameOver(){playTone(300,0.2,'sawtooth',0.1);setTimeout(()=>playTone(200,0.3,'sawtooth',0.08),200);setTimeout(()=>playTone(100,0.5,'sawtooth',0.06),400)}
function sndSplat(){if(!actx)return;try{const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5)*0.15;const s=actx.createBufferSource();s.buffer=buf;s.connect(actx.destination);s.start()}catch(e){}}
function sndWomp(){playTone(300,0.15,'triangle',0.08);setTimeout(()=>playTone(150,0.3,'triangle',0.06),100)}
function sndBoing(){playTone(300,0.05,'sine',0.08);setTimeout(()=>playTone(600,0.05,'sine',0.08),30);setTimeout(()=>playTone(400,0.1,'sine',0.06),60)}
function sndSlurp(){playTone(600,0.05,'sine',0.05);setTimeout(()=>playTone(800,0.04,'sine',0.05),40);setTimeout(()=>playTone(500,0.06,'sine',0.04),80)}

// === CANVAS ===
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;

// === GAME CONSTANTS ===
const TILE=32;
const PLAYER_SPEED=2.2;
const KITCHEN_ROWS=3;

// === POOP SALAD VARIETIES (100 combos from base x topping x garnish) ===
const BASES=['Classic Log','Soft Serve','Corn Studded','Green Goblin','Spicy Magma',
  'Frozen Fudge','Chunky Monkey','Liquid Gold','Pebble Pile','The Anaconda'];
const TOPPINGS=['Lettuce Wrap','Tomato Dice','Onion Ring','Cheese Shred','Crouton Crumble',
  'Olive Oil Drizzle','Ranch Splash','Mystery Sauce','Pickle Chip','Bacon Bit'];
const GARNISHES=['Parsley','Fly','Corn Kernel','Sprinkle','Cherry On Top',
  'Glitter','Eyeball','Gummy Worm','Hot Pepper','Gold Leaf'];
const INGR_EMOJIS={
  base:['💩','🍦','🌽','🤢','🌶️','🧊','🐵','✨','⚫','🐍'],
  topping:['🥬','🍅','🧅','🧀','🍞','🫒','🥛','❓','🥒','🥓'],
  garnish:['🌿','🪰','🌽','🎊','🍒','✨','👁️','🪱','🔥','⭐']
};

function getSaladName(b,t,g){return BASES[b]+' w/ '+TOPPINGS[t]+' & '+GARNISHES[g]}
function getSaladEmojis(b,t,g){return INGR_EMOJIS.base[b]+INGR_EMOJIS.topping[t]+INGR_EMOJIS.garnish[g]}

// === CUSTOMER REACTIONS ===
const REACTIONS_HORROR=['😱','🤮','😨','🤢','😰','💀','🫣','😵'];
const REACTIONS_DISGUST=['🤮','😖','🤢','😬','🥴','😤','😩','🫠'];
const REACTIONS_SHOCK=['😳','😲','😧','🫨','😶','😦','🫢','😮'];
const REACTION_QUOTES=[
  "WHAT IS THIS?!","IS THAT...?!","OH NO...","I ORDERED A CAESAR!",
  "THIS SMELLS LIKE...","MY LAWYER WILL HEAR ABOUT THIS","CALL 911!",
  "WHY IS IT MOVING?!","IT'S LOOKING AT ME","I THINK I'M GONNA...",
  "5 STARS ON YELP THEY SAID","THIS IS A HATE CRIME","IT'S WARM...",
  "I WANT MY MONEY BACK","THERE'S A FLY IN MY... OH WAIT",
  "MY DIET STARTS TOMORROW","*SCREAMS IN ITALIAN*","THE HEALTH INSPECTOR!",
  "I'VE SEEN THINGS...","THAT'S NOT RANCH...","IT HAS A PULSE!",
  "THE PROPHECY IS TRUE","MAMA MIA!","NOPE NOPE NOPE",
  "I TRUSTED YOU","SIR, THIS IS A WENDY'S","WHERE'S THE MANAGER?!",
  "IT WINKED AT ME","*FAINTS*","GORDON RAMSAY WOULD CRY"
];

// === CUSTOMER TYPES ===
const CUSTOMER_TYPES=[
  {name:'Business Guy',emoji:'👔',hair:'#2a2a2a',shirt:'#1a3a6a',patience:1.0},
  {name:'Karen',emoji:'💇‍♀️',hair:'#daa520',shirt:'#ff69b4',patience:0.6},
  {name:'Grandma',emoji:'👵',hair:'#d3d3d3',shirt:'#8fbc8f',patience:1.5},
  {name:'Teenager',emoji:'🧑',hair:'#8b4513',shirt:'#ff4500',patience:0.8},
  {name:'Food Critic',emoji:'🧐',hair:'#1a1a1a',shirt:'#4a0080',patience:0.4},
  {name:'Tourist',emoji:'📸',hair:'#f5deb3',shirt:'#ff6347',patience:1.2},
  {name:'Body Builder',emoji:'💪',hair:'#2a1a0a',shirt:'#222',patience:0.9},
  {name:'Hipster',emoji:'🧔',hair:'#654321',shirt:'#556b2f',patience:0.7},
  {name:'Little Kid',emoji:'👶',hair:'#ffd700',shirt:'#87ceeb',patience:1.3},
  {name:'Alien',emoji:'👽',hair:'#00ff00',shirt:'#1a1a3a',patience:2.0},
];

// === GAME STATE ===
let gameState='menu'; // menu, playing, cooking, delivering, reaction, levelComplete, gameOver
let level=1,score=0,tips=0,served=0,totalToServe=5;
let player={x:0,y:0,dir:0,carrying:null,frame:0,moving:false};
let customers=[];
let orders=[];
let obstacles=[];
let particles=[];
let floatingTexts=[];
let events=[]; // random events (fart clouds, dogs, etc)
let bubbleGirl={x:0,y:0,bubbles:[],blowTimer:0};
let currentRecipe={base:-1,topping:-1,garnish:-1};
let cookingForOrder=null;
let mapW=0,mapH=0;
let tables=[];
let kitchenArea={x:0,y:0,w:0,h:0};
let camera={x:0,y:0};
let frameCount=0;
let comboCount=0;
let dpadDir={up:false,down:false,left:false,right:false};
let isMobile=false;

// === LEVEL CONFIG ===
function getLevelConfig(lv){
  return{
    customers:Math.min(3+Math.floor(lv/2),8),
    toServe:Math.min(4+lv,15),
    orderComplexity:Math.min(1+Math.floor(lv/3),3), // 1=base only, 2=base+top, 3=all
    patience:Math.max(1.0-lv*0.04,0.3),
    obstacleCount:Math.min(2+Math.floor(lv/2),10),
    eventFrequency:Math.max(600-lv*20,150),
    dogChance:Math.min(0.05+lv*0.01,0.2),
    fartChance:Math.min(0.08+lv*0.01,0.25),
    tips:Math.floor(5+lv*2),
  };
}

// === MAP GENERATION ===
function generateMap(){
  const cfg=getLevelConfig(level);
  mapW=14;mapH=16;
  tables=[];obstacles=[];

  // Kitchen at top (rows 0-2)
  kitchenArea={x:1,y:0,w:mapW-2,h:KITCHEN_ROWS};

  // Place tables in dining area (rows 4-14)
  let numTables=cfg.customers;
  let spots=[];
  for(let r=5;r<mapH-2;r+=3)for(let c=2;c<mapW-3;c+=4)spots.push({x:c,y:r});
  // Shuffle
  for(let i=spots.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[spots[i],spots[j]]=[spots[j],spots[i]]}
  for(let i=0;i<Math.min(numTables,spots.length);i++){
    tables.push({x:spots[i].x,y:spots[i].y,w:2,h:1,customer:null,order:null,served:false,reactionTimer:0,reaction:null});
  }

  // Obstacles (booths, planters, spills)
  const obstacleTypes=['booth','planter','spill','trashcan'];
  for(let i=0;i<cfg.obstacleCount;i++){
    let attempts=0,ox,oy;
    do{ox=1+Math.floor(Math.random()*(mapW-2));oy=KITCHEN_ROWS+2+Math.floor(Math.random()*(mapH-KITCHEN_ROWS-4));attempts++}
    while(attempts<50&&isBlocked(ox,oy));
    if(attempts<50)obstacles.push({x:ox,y:oy,type:obstacleTypes[i%obstacleTypes.length]});
  }

  // Bubble girl position (near entrance)
  bubbleGirl.x=mapW-2;bubbleGirl.y=mapH-2;bubbleGirl.bubbles=[];bubbleGirl.blowTimer=0;

  // Player start
  player.x=Math.floor(mapW/2);player.y=1;player.carrying=null;player.dir=2;
}

function isBlocked(tx,ty){
  if(tx<0||ty<0||tx>=mapW||ty>=mapH)return true;
  if(ty<KITCHEN_ROWS+1)return true; // kitchen wall
  for(let t of tables)if(tx>=t.x&&tx<t.x+t.w&&ty>=t.y&&ty<t.y+t.h)return true;
  for(let o of obstacles)if(o.x===tx&&o.y===ty)return true;
  return false;
}

function isWalkable(px,py){
  let tx=Math.floor(px),ty=Math.floor(py);
  if(tx<0||ty<0||tx>=mapW||ty>=mapH)return false;
  // Kitchen counter wall at row KITCHEN_ROWS (except door at center)
  if(ty===KITCHEN_ROWS&&(tx<Math.floor(mapW/2)-1||tx>Math.floor(mapW/2)+1))return false;
  for(let o of obstacles)if(o.x===tx&&o.y===ty)return true===false; // obstacles block
  for(let t of tables)if(px+0.3>t.x&&px-0.3<t.x+t.w&&py+0.3>t.y&&py-0.3<t.y+t.h)return false;
  for(let o of obstacles)if(Math.abs(px-o.x-0.5)<0.7&&Math.abs(py-o.y-0.5)<0.7)return false;
  return true;
}

// === CUSTOMER / ORDER MANAGEMENT ===
function spawnCustomer(table){
  let type=CUSTOMER_TYPES[Math.floor(Math.random()*CUSTOMER_TYPES.length)];
  let cfg=getLevelConfig(level);
  let b=Math.floor(Math.random()*BASES.length);
  let t=cfg.orderComplexity>=2?Math.floor(Math.random()*TOPPINGS.length):0;
  let g=cfg.orderComplexity>=3?Math.floor(Math.random()*GARNISHES.length):0;
  let order={base:b,topping:t,garnish:g,name:getSaladName(b,t,g),emojis:getSaladEmojis(b,t,g),
    patience:800*cfg.patience*type.patience,maxPatience:800*cfg.patience*type.patience,
    complexity:cfg.orderComplexity};
  table.customer=type;table.order=order;table.served=false;table.reactionTimer=0;table.reaction=null;
  orders.push({table:table,order:order});
  updateOrderQueue();
}

function updateOrderQueue(){
  let el=document.getElementById('order-queue');
  el.innerHTML='';
  for(let o of orders){
    if(o.table.served)continue;
    let pct=o.order.patience/o.order.maxPatience;
    let cls=pct<0.25?'order-ticket urgent':'order-ticket';
    let div=document.createElement('div');div.className=cls;
    div.innerHTML=o.order.emojis+'<br>'+o.table.customer.name;
    el.appendChild(div);
  }
}

// === COOKING ===
function enterKitchen(){
  if(gameState!=='playing')return;
  gameState='cooking';
  currentRecipe={base:-1,topping:-1,garnish:-1};
  cookingForOrder=orders.find(o=>!o.table.served);
  showRecipePanel();
}

function showRecipePanel(){
  let panel=document.getElementById('recipe-panel');
  panel.classList.remove('hidden');
  panel.innerHTML='';
  let order=cookingForOrder?cookingForOrder.order:null;

  // Base ingredients
  let label=document.createElement('div');label.style.cssText='width:100%;color:#ffd700;font-size:11px;text-align:center;font-weight:bold';
  label.textContent='💩 PICK YOUR POOP BASE:';panel.appendChild(label);
  for(let i=0;i<BASES.length;i++){
    let btn=document.createElement('div');btn.className='ingr-btn';btn.textContent=INGR_EMOJIS.base[i];
    btn.innerHTML+=`<span class="ingr-name">${BASES[i].substring(0,8)}</span>`;
    let idx=i;btn.onclick=()=>{currentRecipe.base=idx;sndPickup();updateRecipeHighlights();
      if(cookingForOrder&&cookingForOrder.order.complexity<2)finishCooking();};
    panel.appendChild(btn);
  }

  if(!order||order.complexity>=2){
    let label2=document.createElement('div');label2.style.cssText='width:100%;color:#69db7c;font-size:11px;text-align:center;font-weight:bold;margin-top:4px';
    label2.textContent='🥗 ADD TOPPING:';panel.appendChild(label2);
    for(let i=0;i<TOPPINGS.length;i++){
      let btn=document.createElement('div');btn.className='ingr-btn';btn.textContent=INGR_EMOJIS.topping[i];
      btn.innerHTML+=`<span class="ingr-name">${TOPPINGS[i].substring(0,8)}</span>`;
      let idx=i;btn.onclick=()=>{currentRecipe.topping=idx;sndPickup();updateRecipeHighlights();
        if(cookingForOrder&&cookingForOrder.order.complexity<3)finishCooking();};
      panel.appendChild(btn);
    }
  }

  if(!order||order.complexity>=3){
    let label3=document.createElement('div');label3.style.cssText='width:100%;color:#ffa94d;font-size:11px;text-align:center;font-weight:bold;margin-top:4px';
    label3.textContent='✨ GARNISH:';panel.appendChild(label3);
    for(let i=0;i<GARNISHES.length;i++){
      let btn=document.createElement('div');btn.className='ingr-btn';btn.textContent=INGR_EMOJIS.garnish[i];
      btn.innerHTML+=`<span class="ingr-name">${GARNISHES[i].substring(0,8)}</span>`;
      let idx=i;btn.onclick=()=>{currentRecipe.garnish=idx;sndPickup();updateRecipeHighlights();finishCooking()};
      panel.appendChild(btn);
    }
  }
}

function updateRecipeHighlights(){
  let btns=document.querySelectorAll('.ingr-btn');
  btns.forEach(b=>b.classList.remove('selected'));
}

function finishCooking(){
  if(currentRecipe.base<0)return;
  let cfg=getLevelConfig(level);
  if(cfg.orderComplexity>=2&&currentRecipe.topping<0)return;
  if(cfg.orderComplexity>=3&&currentRecipe.garnish<0)return;

  player.carrying={...currentRecipe,name:getSaladName(currentRecipe.base,currentRecipe.topping>=0?currentRecipe.topping:0,currentRecipe.garnish>=0?currentRecipe.garnish:0),
    emojis:getSaladEmojis(currentRecipe.base,currentRecipe.topping>=0?currentRecipe.topping:0,currentRecipe.garnish>=0?currentRecipe.garnish:0)};
  document.getElementById('recipe-panel').classList.add('hidden');
  sndServe();
  gameState='playing';

  floatingTexts.push({x:player.x*TILE+TILE/2,y:player.y*TILE-10,text:'ORDER UP!',color:'#ffd700',life:50,maxLife:50,size:14});
}

// === SERVING ===
function tryServe(){
  if(!player.carrying||gameState!=='playing')return;
  for(let t of tables){
    if(!t.customer||t.served)continue;
    let dx=Math.abs(player.x-(t.x+0.5)),dy=Math.abs(player.y-(t.y+0.5));
    if(dx<2&&dy<2){
      // Serve!
      let order=t.order;
      let correct=player.carrying.base===order.base;
      if(order.complexity>=2)correct=correct&&player.carrying.topping===order.topping;
      if(order.complexity>=3)correct=correct&&player.carrying.garnish===order.garnish;

      t.served=true;
      player.carrying=null;
      served++;

      // Customer reaction
      gameState='reaction';
      let patiencePct=order.patience/order.maxPatience;
      let reactionSet=correct?REACTIONS_HORROR:REACTIONS_DISGUST;
      if(patiencePct<0.25)reactionSet=REACTIONS_SHOCK;
      t.reaction={
        emoji:reactionSet[Math.floor(Math.random()*reactionSet.length)],
        quote:REACTION_QUOTES[Math.floor(Math.random()*REACTION_QUOTES.length)],
        correct:correct
      };
      t.reactionTimer=120;

      // Scoring
      let pts=correct?100+Math.floor(patiencePct*50):25;
      if(comboCount>0)pts=Math.floor(pts*(1+comboCount*0.2));
      let tipAmt=correct?Math.floor(getLevelConfig(level).tips*patiencePct):1;
      score+=pts;tips+=tipAmt;
      if(correct)comboCount++;else comboCount=0;

      sndHorror();
      if(correct)sndCashRegister();
      else sndWomp();

      // Particles
      let px=t.x*TILE+TILE,py=t.y*TILE+TILE/2;
      for(let i=0;i<15;i++){
        let a=Math.random()*Math.PI*2,sp=2+Math.random()*3;
        particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:30+Math.random()*20,maxLife:50,
          color:correct?'#ffd700':'#8b4513',size:3+Math.random()*3});
      }
      floatingTexts.push({x:px,y:py-20,text:(correct?'':'WRONG! ')+'+'+pts+(comboCount>1?' x'+comboCount+' COMBO!':''),
        color:correct?'#ffd700':'#ff4444',life:60,maxLife:60,size:correct?16:13});
      if(tipAmt>0)floatingTexts.push({x:px+20,y:py,text:'$'+tipAmt+' TIP',color:'#69db7c',life:40,maxLife:40,size:11});

      updateHUD();updateOrderQueue();

      // After reaction, continue or end level
      setTimeout(()=>{
        if(gameState==='reaction')gameState='playing';
        t.customer=null;t.order=null;
        if(served>=totalToServe){levelComplete()}
        else{
          // Spawn new customer after delay
          setTimeout(()=>{
            if(gameState==='playing'){
              let empty=tables.filter(tt=>!tt.customer);
              if(empty.length>0)spawnCustomer(empty[Math.floor(Math.random()*empty.length)]);
            }
          },1000);
        }
      },2000);

      return;
    }
  }
  // Not near a table
  sndBoing();
  floatingTexts.push({x:player.x*TILE+TILE/2,y:player.y*TILE-10,text:'GET CLOSER!',color:'#ff6b35',life:30,maxLife:30,size:12});
}

// === RANDOM EVENTS ===
function spawnRandomEvent(){
  let cfg=getLevelConfig(level);
  let roll=Math.random();
  if(roll<cfg.fartChance){
    // Fart cloud!
    let fx=2+Math.random()*(mapW-4),fy=KITCHEN_ROWS+2+Math.random()*(mapH-KITCHEN_ROWS-4);
    events.push({type:'fart',x:fx*TILE,y:fy*TILE,life:180,maxLife:180,radius:TILE*1.5});
    sndFart();
    floatingTexts.push({x:fx*TILE,y:fy*TILE-20,text:'*PFFFFFFT*',color:'#90EE90',life:40,maxLife:40,size:14});
  }else if(roll<cfg.fartChance+cfg.dogChance){
    // Random dog!
    let side=Math.random()<0.5?0:mapW-1;
    let dy2=KITCHEN_ROWS+3+Math.floor(Math.random()*(mapH-KITCHEN_ROWS-5));
    events.push({type:'dog',x:side*TILE,y:dy2*TILE,targetX:(mapW-1-side)*TILE,life:300,maxLife:300,speed:1.5+Math.random()});
    sndBark();
    floatingTexts.push({x:side*TILE+TILE/2,y:dy2*TILE-10,text:'WOOF!',color:'#DEB887',life:30,maxLife:30,size:16});
  }
}

// === LEVEL FLOW ===
function startLevel(lv){
  level=lv;score=0;tips=0;served=0;comboCount=0;
  let cfg=getLevelConfig(level);
  totalToServe=cfg.toServe;
  particles=[];floatingTexts=[];events=[];orders=[];
  generateMap();
  // Spawn initial customers
  let initial=Math.min(cfg.customers,tables.length);
  let shuffledTables=[...tables];
  for(let i=shuffledTables.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[shuffledTables[i],shuffledTables[j]]=[shuffledTables[j],shuffledTables[i]]}
  for(let i=0;i<initial;i++)spawnCustomer(shuffledTables[i]);
  gameState='playing';
  updateHUD();
  document.getElementById('recipe-panel').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
  if(isMobile)document.getElementById('mobile-dpad').style.display='block';
}

function levelComplete(){
  gameState='levelComplete';sndLevelUp();
  setTimeout(()=>showOverlay('levelComplete'),500);
}

function checkGameOver(){
  // Check if all orders timed out
  let activeOrders=orders.filter(o=>!o.table.served&&o.table.customer);
  for(let o of activeOrders){
    if(o.order.patience<=0){
      o.table.served=true;served++;
      o.table.reaction={emoji:'😤',quote:'I AM LEAVING!',correct:false};
      o.table.reactionTimer=60;
      sndGameOver();
      floatingTexts.push({x:o.table.x*TILE+TILE,y:o.table.y*TILE-10,text:'CUSTOMER LEFT!',color:'#ff0000',life:50,maxLife:50,size:13});
      comboCount=0;
      setTimeout(()=>{
        o.table.customer=null;o.table.order=null;
        if(served>=totalToServe)showOverlay('levelComplete');
        else{
          let empty=tables.filter(t=>!t.customer);
          if(empty.length>0)spawnCustomer(empty[Math.floor(Math.random()*empty.length)]);
        }
      },1500);
      updateOrderQueue();
    }
  }
}

// === HUD ===
function updateHUD(){
  document.getElementById('h-level').textContent=level;
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-tips').textContent='$'+tips;
  document.getElementById('h-served').textContent=served+'/'+totalToServe;
}

// === OVERLAY ===
function showOverlay(type){
  const ov=document.getElementById('overlay'),h1=ov.querySelector('h1'),sub=ov.querySelector('.sub');
  const btn=document.getElementById('btn-play'),lvlTitle=document.getElementById('level-title'),stats=document.getElementById('end-stats');
  ov.classList.remove('hidden');stats.textContent='';lvlTitle.textContent='';
  if(isMobile)document.getElementById('mobile-dpad').style.display='none';
  document.getElementById('recipe-panel').classList.add('hidden');

  if(type==='menu'){
    h1.innerHTML='💩🥗 POOP SALAD';
    sub.innerHTML='Welcome to the worst restaurant in town!<br>Cook poop salads, dodge obstacles, serve horrified customers!<br><br>WASD/Arrows to move | SPACE near kitchen to cook | SPACE near table to serve';
    btn.textContent='START SHIFT';btn.onclick=()=>startLevel(1);
  }else if(type==='levelComplete'){
    let stars=tips>=getLevelConfig(level).tips*totalToServe*0.6?3:tips>=getLevelConfig(level).tips*totalToServe*0.3?2:1;
    h1.innerHTML=stars>=2?'💩 SHIFT COMPLETE!':'💩 BARELY SURVIVED!';
    lvlTitle.textContent='Level '+level;
    sub.innerHTML='Score: '+score+' | Tips: $'+tips;
    stats.textContent='\u2B50'.repeat(stars)+' '.repeat(3-stars)+' | Combo: x'+comboCount;
    btn.textContent='NEXT SHIFT';btn.onclick=()=>startLevel(level+1);
  }else if(type==='gameOver'){
    h1.innerHTML='💩 FIRED!';sub.textContent='The health inspector shut you down!';
    stats.textContent='Final Score: '+score+' | Tips: $'+tips;
    btn.textContent='TRY AGAIN';btn.onclick=()=>startLevel(level);
  }
}

// === INPUT ===
let keys={};
document.addEventListener('keydown',(e)=>{
  keys[e.key]=true;
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(gameState==='playing'){
      ensureAudio();
      // Near kitchen?
      if(player.y<=KITCHEN_ROWS+1&&!player.carrying)enterKitchen();
      else if(player.carrying)tryServe();
    }
  }
  if(e.key==='Escape'&&gameState==='cooking'){
    gameState='playing';document.getElementById('recipe-panel').classList.add('hidden');
  }
});
document.addEventListener('keyup',(e)=>{keys[e.key]=false});

// Mobile D-pad
document.querySelectorAll('.dpad-btn').forEach(btn=>{
  let dir=btn.dataset.dir;
  btn.addEventListener('touchstart',(e)=>{e.preventDefault();dpadDir[dir]=true;ensureAudio()});
  btn.addEventListener('touchend',(e)=>{e.preventDefault();dpadDir[dir]=false});
  btn.addEventListener('mousedown',(e)=>{dpadDir[dir]=true;ensureAudio()});
  btn.addEventListener('mouseup',(e)=>{dpadDir[dir]=false});
});

// Tap to interact on mobile
canvas.addEventListener('pointerdown',(e)=>{
  e.preventDefault();ensureAudio();
  if(gameState==='playing'){
    let rect=canvas.getBoundingClientRect();
    let tx=(e.clientX-rect.left+camera.x)/TILE;
    let ty=(e.clientY-rect.top+camera.y)/TILE;
    // Tap kitchen area?
    if(ty<=KITCHEN_ROWS+1&&!player.carrying){enterKitchen();return}
    // Tap near table while carrying?
    if(player.carrying){tryServe();return}
    // Otherwise try to move toward tap
    let dx=tx-player.x,dy=ty-player.y;
    if(Math.abs(dx)>Math.abs(dy)){dpadDir.left=dx<0;dpadDir.right=dx>0;dpadDir.up=false;dpadDir.down=false}
    else{dpadDir.up=dy<0;dpadDir.down=dy>0;dpadDir.left=false;dpadDir.right=false}
    setTimeout(()=>{dpadDir.up=dpadDir.down=dpadDir.left=dpadDir.right=false},200);
  }
});

// === DRAWING FUNCTIONS ===
function drawFloor(){
  for(let r=0;r<mapH;r++)for(let c=0;c<mapW;c++){
    let px=c*TILE-camera.x,py=r*TILE-camera.y;
    if(r<KITCHEN_ROWS){
      // Kitchen floor
      ctx.fillStyle=(c+r)%2===0?'#3a2a1a':'#4a3020';
    }else if(r===KITCHEN_ROWS){
      // Counter
      ctx.fillStyle='#6b4226';
    }else{
      // Dining floor - checkered diner style
      ctx.fillStyle=(c+r)%2===0?'#2a1a0f':'#352010';
    }
    ctx.fillRect(px,py,TILE+1,TILE+1);
  }
  // Kitchen counter detail
  let cy=KITCHEN_ROWS*TILE-camera.y;
  ctx.fillStyle='#8B4513';ctx.fillRect(0,cy,mapW*TILE,TILE);
  ctx.fillStyle='#A0522D';ctx.fillRect(0,cy+2,mapW*TILE,4);
  // Door gap
  let doorX=Math.floor(mapW/2)-1;
  ctx.fillStyle='#352010';ctx.fillRect(doorX*TILE-camera.x,cy,3*TILE,TILE);
  ctx.fillStyle='#ffd700';ctx.font='bold 10px monospace';ctx.textAlign='center';
  ctx.fillText('KITCHEN',doorX*TILE+TILE*1.5-camera.x,cy+TILE*0.65);

  // Kitchen equipment
  ctx.fillStyle='#555';
  ctx.fillRect(1*TILE-camera.x,0.2*TILE-camera.y,2*TILE,1.5*TILE); // stove
  ctx.fillStyle='#888';
  ctx.fillRect((mapW-3)*TILE-camera.x,0.2*TILE-camera.y,2*TILE,1.5*TILE); // fridge
  ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('STOVE',2*TILE-camera.x,1.2*TILE-camera.y);
  ctx.fillText('FRIDGE',(mapW-2)*TILE-camera.x,1.2*TILE-camera.y);
}

function drawTables(){
  for(let t of tables){
    let px=t.x*TILE-camera.x,py=t.y*TILE-camera.y;
    // Table
    ctx.fillStyle='#8B6914';
    ctx.fillRect(px+2,py+2,t.w*TILE-4,t.h*TILE-4);
    ctx.strokeStyle='#6B4914';ctx.lineWidth=2;
    ctx.strokeRect(px+2,py+2,t.w*TILE-4,t.h*TILE-4);

    // Chair
    ctx.fillStyle='#A0522D';
    ctx.fillRect(px+TILE*0.3,py-TILE*0.4,TILE*0.4,TILE*0.35);
    ctx.fillRect(px+TILE*1.3,py-TILE*0.4,TILE*0.4,TILE*0.35);

    if(t.customer){
      // Draw customer
      let cx2=px+TILE,cy2=py-TILE*0.1;
      // Body
      ctx.fillStyle=t.customer.shirt;
      ctx.beginPath();ctx.ellipse(cx2,cy2,TILE*0.35,TILE*0.25,0,0,Math.PI*2);ctx.fill();
      // Head
      ctx.fillStyle='#f0c8a0';
      ctx.beginPath();ctx.arc(cx2,cy2-TILE*0.3,TILE*0.22,0,Math.PI*2);ctx.fill();
      // Hair
      ctx.fillStyle=t.customer.hair;
      ctx.beginPath();ctx.arc(cx2,cy2-TILE*0.38,TILE*0.18,Math.PI,Math.PI*2);ctx.fill();

      // Order bubble
      if(!t.served&&t.order){
        let bx=cx2+TILE*0.6,by=cy2-TILE*0.8;
        ctx.fillStyle='rgba(255,240,200,0.9)';
        ctx.beginPath();ctx.arc(bx,by,TILE*0.35,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#8B4513';ctx.lineWidth=1;ctx.stroke();
        ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#000';ctx.fillText(t.order.emojis.substring(0,4),bx,by);

        // Patience bar
        let pct=t.order.patience/t.order.maxPatience;
        let bw=t.w*TILE-8;
        ctx.fillStyle='#333';ctx.fillRect(px+4,py+t.h*TILE+2,bw,4);
        ctx.fillStyle=pct>0.5?'#69db7c':pct>0.25?'#ffa94d':'#ff4444';
        ctx.fillRect(px+4,py+t.h*TILE+2,bw*pct,4);
      }

      // Reaction
      if(t.reaction&&t.reactionTimer>0){
        let ra=t.reactionTimer/120;
        ctx.font=`${24+Math.sin(frameCount*0.3)*4}px sans-serif`;ctx.textAlign='center';
        ctx.globalAlpha=Math.min(ra*2,1);
        ctx.fillText(t.reaction.emoji,cx2,cy2-TILE*0.9-Math.sin(frameCount*0.1)*5);
        ctx.font='bold 9px monospace';ctx.fillStyle=t.reaction.correct?'#ffd700':'#ff4444';
        ctx.fillText(t.reaction.quote.substring(0,25),cx2,cy2-TILE*1.4);
        ctx.globalAlpha=1;
      }
    }
  }
}

function drawObstacles(){
  for(let o of obstacles){
    let px=o.x*TILE-camera.x,py=o.y*TILE-camera.y;
    if(o.type==='booth'){
      ctx.fillStyle='#8B0000';ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
      ctx.fillStyle='#A52A2A';ctx.fillRect(px+4,py+4,TILE-8,TILE*0.4);
      ctx.fillStyle='#ffd700';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('BOOTH',px+TILE/2,py+TILE*0.8);
    }else if(o.type==='planter'){
      ctx.fillStyle='#556B2F';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2,TILE*0.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#228B22';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('🌿',px+TILE/2,py+TILE*0.7);
    }else if(o.type==='spill'){
      ctx.fillStyle='rgba(100,200,255,0.3)';ctx.beginPath();ctx.ellipse(px+TILE/2,py+TILE/2,TILE*0.45,TILE*0.3,0.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#87CEEB';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('SPILL',px+TILE/2,py+TILE*0.6);
    }else{
      ctx.fillStyle='#444';ctx.fillRect(px+6,py+4,TILE-12,TILE-6);
      ctx.fillStyle='#666';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('🗑️',px+TILE/2,py+TILE*0.7);
    }
  }
}

function drawPlayer(){
  let px=player.x*TILE-camera.x,py=player.y*TILE-camera.y;
  let bob=player.moving?Math.sin(frameCount*0.3)*2:0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(px+TILE/2,py+TILE*0.85,TILE*0.3,TILE*0.08,0,0,Math.PI*2);ctx.fill();

  // Body (waiter outfit)
  ctx.fillStyle='#1a1a1a'; // black pants
  ctx.fillRect(px+TILE*0.25,py+TILE*0.55+bob,TILE*0.5,TILE*0.35);
  ctx.fillStyle='#fff'; // white shirt
  ctx.beginPath();ctx.ellipse(px+TILE/2,py+TILE*0.4+bob,TILE*0.28,TILE*0.22,0,0,Math.PI*2);ctx.fill();
  // Bow tie
  ctx.fillStyle='#ff0000';
  ctx.beginPath();ctx.moveTo(px+TILE*0.4,py+TILE*0.32+bob);ctx.lineTo(px+TILE/2,py+TILE*0.36+bob);ctx.lineTo(px+TILE*0.6,py+TILE*0.32+bob);
  ctx.lineTo(px+TILE/2,py+TILE*0.28+bob);ctx.closePath();ctx.fill();
  // Head
  ctx.fillStyle='#f0c8a0';
  ctx.beginPath();ctx.arc(px+TILE/2,py+TILE*0.2+bob,TILE*0.2,0,Math.PI*2);ctx.fill();
  // Eyes (direction based)
  ctx.fillStyle='#1a1a1a';
  let ex=player.dir===1?-3:player.dir===3?3:0;
  let ey=player.dir===0?-2:player.dir===2?2:0;
  ctx.beginPath();ctx.arc(px+TILE*0.42+ex,py+TILE*0.18+bob+ey,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+TILE*0.58+ex,py+TILE*0.18+bob+ey,2,0,Math.PI*2);ctx.fill();
  // Mustache (it's a fancy waiter)
  ctx.strokeStyle='#4a3020';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px+TILE*0.38,py+TILE*0.25+bob);ctx.quadraticCurveTo(px+TILE/2,py+TILE*0.22+bob,px+TILE*0.62,py+TILE*0.25+bob);ctx.stroke();

  // Carrying indicator
  if(player.carrying){
    ctx.fillStyle='rgba(139,69,19,0.8)';
    ctx.beginPath();ctx.arc(px+TILE/2,py-TILE*0.15+bob,TILE*0.28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💩',px+TILE/2,py-TILE*0.15+bob);
    // Stink lines
    let stinkWave=Math.sin(frameCount*0.1);
    ctx.strokeStyle='rgba(144,238,144,0.4)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      let sx=px+TILE*0.3+i*TILE*0.2;
      ctx.beginPath();ctx.moveTo(sx,py-TILE*0.3+bob);
      ctx.quadraticCurveTo(sx+stinkWave*3,py-TILE*0.5+bob,sx-stinkWave*2,py-TILE*0.7+bob);
      ctx.stroke();
    }
  }

  // Walking legs animation
  if(player.moving){
    let legSwing=Math.sin(frameCount*0.4)*TILE*0.08;
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(px+TILE*0.3+legSwing,py+TILE*0.8+bob,TILE*0.12,TILE*0.12);
    ctx.fillRect(px+TILE*0.55-legSwing,py+TILE*0.8+bob,TILE*0.12,TILE*0.12);
  }
}

    sndBubble();
    bubbleGirl.bubbles.push({x:px+TILE/2,y:py+TILE*0.1,vx:(Math.random()-0.5)*0.8,vy:-0.5-Math.random()*0.3,
      size:4+Math.random()*8,life:120+Math.random()*60,color:`hsla(${Math.random()*360},80%,70%,0.5)`});
  }
  // Draw & update bubbles
  for(let i=bubbleGirl.bubbles.length-1;i>=0;i--){
    let b=bubbleGirl.bubbles[i];
    b.x+=b.vx+Math.sin(frameCount*0.05+i)*0.3;b.y+=b.vy;b.life--;
    if(b.life<=0){bubbleGirl.bubbles.splice(i,1);continue}
    ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(b.x-b.size*0.25,b.y-b.size*0.25,b.size*0.25,0,Math.PI*2);ctx.fill();
  }

  // Snarky comment occasionally
  if(frameCount%400<30){
    let quips=["Like, whatever...","*pop*","Nice apron, loser","This job sucks","*blows bubble*","Ew.","Is that poop?!","Gag me with a spoon"];
    let q=quips[Math.floor(frameCount/400)%quips.length];
    ctx.fillStyle='rgba(255,105,180,0.8)';ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(q,px+TILE/2,py-TILE*0.2+Math.sin(frameCount*0.1)*2);
  }
}

function drawEvents(){
  for(let i=events.length-1;i>=0;i--){
    let ev=events[i];ev.life--;
    if(ev.life<=0){events.splice(i,1);continue}
    let alpha=Math.min(ev.life/30,1);

    if(ev.type==='fart'){
      // Green cloud
      ctx.globalAlpha=alpha*0.5;
      let cloudR=ev.radius*(1+(1-ev.life/ev.maxLife)*0.5);
      let gradient=ctx.createRadialGradient(ev.x-camera.x,ev.y-camera.y,0,ev.x-camera.x,ev.y-camera.y,cloudR);
      gradient.addColorStop(0,'rgba(100,180,50,0.5)');gradient.addColorStop(1,'rgba(100,180,50,0)');
      ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(ev.x-camera.x,ev.y-camera.y,cloudR,0,Math.PI*2);ctx.fill();
      // Stink waves
      ctx.strokeStyle='rgba(150,220,80,0.3)';ctx.lineWidth=1.5;
      for(let w=0;w<3;w++){
        let wa=frameCount*0.05+w*2;
        ctx.beginPath();
        ctx.arc(ev.x-camera.x,ev.y-camera.y,cloudR*0.5+Math.sin(wa)*cloudR*0.2,w,w+Math.PI*0.8);
        ctx.stroke();
      }
      ctx.globalAlpha=1;
      // Slow player if nearby
      let pdx=player.x*TILE-ev.x,pdy=player.y*TILE-ev.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<cloudR)player.moving=false; // stun briefly
    }
    else if(ev.type==='dog'){
      // Running dog
      let t=1-ev.life/ev.maxLife;
      ev.x+=(ev.targetX>ev.x?1:-1)*ev.speed;
      let dx=ev.x-camera.x,dy=ev.y-camera.y;
      let legBob=Math.sin(frameCount*0.5)*3;
      // Body
      ctx.fillStyle='#c8a87c';
      ctx.beginPath();ctx.ellipse(dx+TILE/2,dy+TILE*0.5,TILE*0.4,TILE*0.2,0,0,Math.PI*2);ctx.fill();
      // Head
      ctx.fillStyle='#b89868';
      ctx.beginPath();ctx.arc(dx+(ev.targetX>ev.x?TILE*0.85:TILE*0.15),dy+TILE*0.35,TILE*0.18,0,Math.PI*2);ctx.fill();
      // Ears
      ctx.fillStyle='#a08050';
      ctx.beginPath();ctx.ellipse(dx+(ev.targetX>ev.x?TILE*0.95:TILE*0.05),dy+TILE*0.22,TILE*0.08,TILE*0.12,ev.targetX>ev.x?0.3:-0.3,0,Math.PI*2);ctx.fill();
      // Legs
      ctx.fillStyle='#b89868';
      ctx.fillRect(dx+TILE*0.2,dy+TILE*0.65+legBob,TILE*0.1,TILE*0.2);
      ctx.fillRect(dx+TILE*0.65,dy+TILE*0.65-legBob,TILE*0.1,TILE*0.2);
      // Tail wag
      ctx.strokeStyle='#c8a87c';ctx.lineWidth=3;ctx.lineCap='round';
      let tailWag=Math.sin(frameCount*0.4)*0.5;
      ctx.beginPath();ctx.moveTo(dx+(ev.targetX>ev.x?TILE*0.1:TILE*0.9),dy+TILE*0.4);
      ctx.quadraticCurveTo(dx+(ev.targetX>ev.x?-TILE*0.1:TILE*1.1),dy+TILE*0.2+tailWag*10,
        dx+(ev.targetX>ev.x?-TILE*0.05:TILE*1.05),dy+TILE*0.1);ctx.stroke();
      // Eye
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.arc(dx+(ev.targetX>ev.x?TILE*0.9:TILE*0.1),dy+TILE*0.32,2,0,Math.PI*2);ctx.fill();
      // Bark occasionally
      if(ev.life%80===0){sndBark();floatingTexts.push({x:ev.x+TILE/2,y:ev.y-10,text:'WOOF!',color:'#DEB887',life:20,maxLife:20,size:12})}
      // Bump player
      if(Math.abs(player.x*TILE-ev.x)<TILE&&Math.abs(player.y*TILE-ev.y)<TILE){
        player.x+=ev.targetX>ev.x?-0.3:0.3;sndBoing();
        if(player.carrying&&Math.random()<0.2){
          player.carrying=null;sndSplat();
          floatingTexts.push({x:player.x*TILE+TILE/2,y:player.y*TILE-20,text:'DROPPED IT!',color:'#ff4444',life:40,maxLife:40,size:14});
        }
      }
    }
  }
}

function drawParticles(){
  for(let p of particles){let t=p.life/p.maxLife;ctx.globalAlpha=t;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size*t,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
}

function drawFloatingTexts(){
  for(let ft of floatingTexts){let t=ft.life/ft.maxLife;ctx.globalAlpha=t;ctx.fillStyle=ft.color;ctx.font=`bold ${ft.size}px monospace`;ctx.textAlign='center';ctx.fillText(ft.text,ft.x-camera.x,ft.y-camera.y);ctx.globalAlpha=1}
}

// === UPDATE ===
function update(){
  if(gameState!=='playing'&&gameState!=='reaction')return;
  frameCount++;

  // Player movement
  let dx2=0,dy2=0;
  if(keys['ArrowUp']||keys['w']||keys['W']||dpadDir.up)dy2=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']||dpadDir.down)dy2=1;
  if(keys['ArrowLeft']||keys['a']||keys['A']||dpadDir.left)dx2=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']||dpadDir.right)dx2=1;

  player.moving=dx2!==0||dy2!==0;
  if(player.moving){
    ensureAudio();
    if(dy2<0)player.dir=0;else if(dx2>0)player.dir=1;else if(dy2>0)player.dir=2;else if(dx2<0)player.dir=3;
    let nx=player.x+dx2*PLAYER_SPEED/TILE;
    let ny=player.y+dy2*PLAYER_SPEED/TILE;
    if(isWalkable(nx,player.y))player.x=nx;
    if(isWalkable(player.x,ny))player.y=ny;
    player.x=Math.max(0.3,Math.min(mapW-0.7,player.x));
    player.y=Math.max(0.3,Math.min(mapH-0.7,player.y));
    if(frameCount%8===0)sndStep();
  }

  // Camera
  camera.x=player.x*TILE-W/2+TILE/2;
  camera.y=player.y*TILE-H/2+TILE/2;
  camera.x=Math.max(0,Math.min(mapW*TILE-W,camera.x));
  camera.y=Math.max(0,Math.min(mapH*TILE-H,camera.y));

  // Patience countdown
  for(let o of orders){
    if(!o.table.served&&o.table.customer&&gameState==='playing'){
      o.order.patience-=1;
    }
  }
  if(frameCount%60===0)checkGameOver();

  // Table reaction timers
  for(let t of tables){if(t.reactionTimer>0)t.reactionTimer--}

  // Random events
  let cfg=getLevelConfig(level);
  if(frameCount%cfg.eventFrequency===0&&gameState==='playing')spawnRandomEvent();

  // Particles
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)particles.splice(i,1)}
  for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].y-=0.8;floatingTexts[i].life--;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1)}

  updateHUD();updateOrderQueue();
}

// === RENDER ===
function render(){
  ctx.fillStyle='#1a0a05';ctx.fillRect(0,0,W,H);
  if(gameState==='menu')return;

  ctx.save();
  drawFloor();
  drawObstacles();
  drawTables();
  drawEvents();
  drawBubbleGirl();
  drawPlayer();
  drawParticles();
  drawFloatingTexts();

  // Kitchen prompt
  if(gameState==='playing'&&player.y<=KITCHEN_ROWS+1&&!player.carrying){
    ctx.fillStyle='rgba(255,215,0,0.8)';ctx.font='bold 12px monospace';ctx.textAlign='center';
    let flash=Math.sin(frameCount*0.1)>0;
    if(flash)ctx.fillText('PRESS SPACE TO COOK!',W/2,H*0.4);
  }

  // Serve prompt
  if(player.carrying&&gameState==='playing'){
    let nearTable=false;
    for(let t of tables){
      if(!t.customer||t.served)continue;
      let ddx=Math.abs(player.x-(t.x+0.5)),ddy=Math.abs(player.y-(t.y+0.5));
      if(ddx<2&&ddy<2){nearTable=true;break}
    }
    if(nearTable){
      ctx.fillStyle='rgba(255,215,0,0.9)';ctx.font='bold 13px monospace';ctx.textAlign='center';
      let flash=Math.sin(frameCount*0.15)>0;
      if(flash)ctx.fillText('PRESS SPACE TO SERVE!',W/2,H*0.88);
    }
  }

  // Cooking overlay
  if(gameState==='cooking'){
    ctx.fillStyle='rgba(26,10,5,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillText('COOKING POOP SALAD...',W/2,50);
    if(cookingForOrder){
      ctx.font='11px monospace';ctx.fillStyle='#a08060';
      ctx.fillText('Order: '+cookingForOrder.order.emojis+' '+cookingForOrder.order.name,W/2,70);
    }
    ctx.font='10px monospace';ctx.fillStyle='#666';
    ctx.fillText('(ESC to cancel)',W/2,H-20);
  }

  ctx.restore();
}

// === MAIN LOOP ===
function frame(){
  update();render();
  requestAnimationFrame(frame);
}

// === INIT ===
resize();
showOverlay('menu');
frame();

})();
</script>
