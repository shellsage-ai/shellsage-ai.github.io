<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩🥗 POOP SALAD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0505;font-family:'Courier New',monospace}
canvas{display:block;touch-action:none}
#hud{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:6px 10px;z-index:10;pointer-events:none}
.hb{background:rgba(0,0,0,.75);border:2px solid #4a3020;border-radius:8px;padding:4px 12px;text-align:center}
.hb .l{font-size:9px;color:#a08060;text-transform:uppercase;letter-spacing:1px}
.hb .v{font-size:18px;font-weight:800;color:#ffd700}
#overlay{position:fixed;inset:0;background:rgba(10,5,5,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center}
#overlay.off{display:none}
#overlay h1{font-size:38px;color:#ffd700;text-shadow:0 0 20px #ff6b35}
#overlay .sub{color:#a08060;font-size:13px;margin:12px 20px;line-height:1.5}
.btn{background:linear-gradient(135deg,#8B4513,#D2691E);color:#ffd700;border:2px solid #ffd700;padding:14px 40px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;margin:8px;font-family:inherit;text-transform:uppercase;letter-spacing:2px}
.btn:active{transform:scale(.95)}
#overlay .info{color:#888;font-size:11px;margin-top:8px}
#dpad{display:none}
.db{display:none}
#actbtn{display:none}
#cookpanel{position:fixed;inset:0;background:rgba(10,5,5,.92);z-index:25;display:none;overflow-y:auto;padding:10px}
#cookpanel.on{display:flex;flex-direction:column;align-items:center}
#cookpanel h2{color:#ffd700;font-size:20px;margin:8px 0 4px}
#cookpanel .cat{color:#a08060;font-size:12px;font-weight:700;margin:10px 0 4px;text-transform:uppercase;width:100%;text-align:center}
#cookpanel .igrid{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:400px}
#cookpanel .ib{width:60px;height:60px;border-radius:10px;border:2px solid #3a2510;background:#1a0d05;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:22px;position:relative}
#cookpanel .ib:active{transform:scale(.92)}
#cookpanel .ib.sel{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,.3)}
#cookpanel .ib span{font-size:7px;color:#a08060;margin-top:2px}
#recipe{background:#1a0d05;border:2px solid #4a3020;border-radius:8px;padding:8px 12px;margin:10px 0;width:90%;max-width:380px;min-height:60px}
#recipe h3{color:#ffd700;font-size:12px;margin-bottom:4px}
#recipe .items{display:flex;flex-wrap:wrap;gap:4px}
#recipe .ri{background:#2a1a0a;border:1px solid #4a3020;border-radius:4px;padding:2px 6px;font-size:10px;color:#ddd;cursor:pointer}
#recipe .ri:hover{border-color:#ff4444;text-decoration:line-through}
#cookbtns{display:flex;gap:10px;margin:12px 0}
#cookbtns button{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid}
#cookbtn{background:#8B2500;color:#ffd700;border-color:#ff6b35}
#fridgebtn{background:#1a3a5a;color:#87ceeb;border-color:#69b4ff}
#cancelbtn{background:#333;color:#888;border-color:#555;font-size:11px;padding:6px 16px}
#preview{width:120px;height:120px;border:2px solid #4a3020;border-radius:12px;background:#1a0d05;margin:8px;position:relative;overflow:hidden}
</style>
</head>

// ===== STINK LINES =====
function drawStink(x,y,sz,frame,alpha){
  X.strokeStyle=`rgba(140,200,60,${alpha||.35})`;X.lineWidth=1.5;X.lineCap='round';
  for(let i=0;i<3;i++){
    let sx=x-sz*.3+i*sz*.3,sw=Math.sin(frame*.06+i*1.5);
    X.beginPath();X.moveTo(sx,y);
    X.quadraticCurveTo(sx+sw*sz*.25,y-sz*.5,sx-sw*sz*.2,y-sz);X.stroke();
  }
}

function lcfg(l){return{
  seats:Math.min(2+Math.floor(l/2),8),toServe:Math.min(4+l,12),
  cpx:Math.min(1+Math.floor(l/3),3),patM:Math.max(1-.03*l,.35),
  obs:Math.min(2+Math.floor(l/2),10),evRate:Math.max(450-l*12,180),
  dogCh:Math.min(.04+l*.007,.15),fartCh:Math.min(.05+l*.01,.2),
  tipB:Math.floor(5+l*2),chatR:Math.max(250-l*8,100),
}}

// ===== MAP =====
// Layout: Kitchen(0-4), Counter(5), Bar(6-7), Dining(8-20), Hall(21-22), Patio(23-29)
let zones=[];
function genMap(){
  let c=lcfg(lvl);tables=[];obs=[];zones=[];
  // Zone markers
  zones=[{name:'Kitchen',y1:0,y2:4},{name:'Counter',y1:5,y2:5},{name:'Bar',y1:6,y2:7},
    {name:'Dining Room',y1:8,y2:20},{name:'Hallway',y1:21,y2:22},{name:'Patio',y1:23,y2:29}];
  // Tables in dining room + patio
  let spots=[];
  for(let r=9;r<20;r+=3)for(let cl=2;cl<COLS-3;cl+=5)spots.push({x:cl,y:r});
  for(let r=24;r<28;r+=3)for(let cl=3;cl<COLS-4;cl+=6)spots.push({x:cl,y:r});
  shuffle(spots);
  for(let i=0;i<Math.min(c.seats,spots.length);i++){
    tables.push({x:spots[i].x,y:spots[i].y,w:2,cust:null,order:null,svd:false,
      rt:0,react:null,ct:60+Math.floor(Math.random()*150),chat:''});
  }
  // Obstacles
  let otypes=['booth','planter','spill','barrel','crate'];
  for(let i=0;i<c.obs;i++){
    let at=0,ox,oy;
    do{ox=1+Math.floor(Math.random()*(COLS-2));oy=8+Math.floor(Math.random()*12);at++}
    while(at<50&&blk(ox,oy));
    if(at<50)obs.push({x:ox,y:oy,tp:otypes[i%otypes.length]});
  }
  // Waitress near bar
  wgirl.x=COLS-3;wgirl.y=7;wgirl.bubs=[];wgirl.t=0;
  // Player in kitchen
  pl.x=Math.floor(COLS/2);pl.y=2;pl.carry=null;pl.dir=2;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function blk(tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS)return true;
  for(let t of tables)if(tx>=t.x&&tx<t.x+t.w&&ty===t.y)return true;
  for(let o of obs)if(o.x===tx&&o.y===ty)return true;
  return false;
}
function walk(px,py){
  if(px<.3||py<.3||px>COLS-.7||py>ROWS-.7)return false;
  let tx=Math.floor(px),ty=Math.floor(py);
  // Counter wall row 5 except door
  let dl=Math.floor(COLS/2)-1,dr=Math.floor(COLS/2)+1;
  if(ty===5&&(tx<dl||tx>dr))return false;
  // Hallway wall row 21 except door
  if(ty===21&&(tx<8||tx>10))return false;
  for(let o of obs)if(Math.abs(px-o.x-.5)<.6&&Math.abs(py-o.y-.5)<.6)return false;
  for(let t of tables)if(px+.3>t.x&&px-.3<t.x+t.w&&Math.abs(py-t.y-.5)<.55)return false;
  return true;
}

function spawnC(t){

  let b=Math.floor(Math.random()*BASES.length);
  let top=Math.floor(Math.random()*TOPS.length);
  let g=Math.floor(Math.random()*GARNS.length);
  // Build expected order items
  let items=[BASES[b]];
  if(c.cpx>=2)items.push(TOPS[top]);
  if(c.cpx>=3)items.push(GARNS[g]);
  t.cust=tp;t.order={items,patience:mxP,maxP:mxP,emojis:items.map(i=>i.e).join(''),name:items.map(i=>i.n).join(' + ')};
  t.svd=false;t.rt=0;t.react=null;t.ct=80+Math.floor(Math.random()*120);
}

function drawPreview(){
  let cv=document.getElementById('preview');

  if(cook.items.length>0){

    px.fillStyle='#5a3a18';px.beginPath();px.ellipse(62,52,12,8,-.2,0,Math.PI*2);px.fill();

    px.font='16px sans-serif';px.textAlign='center';
    cook.items.forEach((it,i)=>{
      if(i===0)return; // skip base
      let ax=45+Math.cos(i*1.8)*18,ay=55+Math.sin(i*1.2)*8;
      px.fillText(it.e,ax,ay);
    });

window._addItem=function(cat,idx){
  let arr=cat==='base'?BASES:cat==='top'?TOPS:cat==='garn'?GARNS:SAUCES;
  let item=arr[idx];
  if(!cook.items.includes(item)){cook.items.push(item);sChop()}
  renderCookPanel();
};
window._rmItem=function(idx){
  cook.items.splice(idx,1);renderCookPanel();
};
window._cancelCook=function(){
  document.getElementById('cookpanel').classList.remove('on');st='playing';
};
window._finishCook=function(mode){
  if(cook.items.length===0)return;
  let name=cook.items.map(i=>i.n).join(' + ');
  let emojis=cook.items.map(i=>i.e).join('');
  let baseIdx=BASES.indexOf(cook.items.find(it=>BASES.includes(it)));
  if(baseIdx<0)baseIdx=0;
  // Check if already cooked/fridged once for BOTH mode
  let prevMode=null;
  if(pl.carry&&pl.carry.items.length>0){prevMode=pl.carry.mode}
  let finalMode=mode;
  if(prevMode==='hot'&&mode==='cold')finalMode='both';
  else if(prevMode==='cold'&&mode==='hot')finalMode='both';
  pl.carry={items:[...cook.items],name,emojis,mode:finalMode,baseIdx,
    shortName:(cook.items[0]?.n||'Mystery')+' '+(finalMode==='hot'?'Cooked':finalMode==='cold'?'Chilled':'ABOMINATION')};
  document.getElementById('cookpanel').classList.remove('on');
  st='playing';
  if(finalMode==='hot'){sServe();addF(pl.x*T+T/2,pl.y*T-20,'🔥 ORDER UP!','#ff6b35',18,60)}
  else if(finalMode==='cold'){sChill();addF(pl.x*T+T/2,pl.y*T-20,'🧊 CHILLED!','#87ceeb',18,60)}
  else{sServe();sChill();addF(pl.x*T+T/2,pl.y*T-20,'💀 ABOMINATION! 💀','#ff00ff',22,90)}
};

// ===== SERVING =====
function tryServe(){
  if(!pl.carry||st!=='playing')return;
  let best=null,bd=99;
  for(let t of tables){
    if(!t.cust||t.svd)continue;
    let d=Math.hypot(pl.x-(t.x+1),pl.y-t.y);
    if(d<2.8&&d<bd){bd=d;best=t}
  }
  if(!best){sBoing();addF(pl.x*T+T/2,pl.y*T-20,'GET CLOSER!','#ff6b35',16,30);return}
  let t=best,ord=t.order;
  // Check if carry items contain all order items
  let correct=ord.items.every(oi=>pl.carry.items.some(ci=>ci.n===oi.n));
  let isAbom=pl.carry.mode==='both';
  t.svd=true;pl.carry=null;served++;
  if(correct)combo++;else combo=0;
  t.react={e:REACT_E[Math.floor(Math.random()*REACT_E.length)],
    q:REACTIONS[Math.floor(Math.random()*REACTIONS.length)],ok:correct};
  t.rt=160;
  let pct=ord.patience/ord.maxP;
  let pts=correct?100+Math.floor(pct*80):15;
  // ABOMINATION bonus!
  if(isAbom){pts=Math.floor(pts*2.5);tip=Math.floor(tip*3)}
  if(combo>1)pts=Math.floor(pts*(1+combo*.15));
  let tip=correct?Math.floor(lcfg(lvl).tipB*pct):0;
  score+=pts;tips+=tip;
  sHorror();if(correct)sCash();else sWomp();
  if(isAbom){
    let abomReacts=["IT'S HOT AND COLD AND I'M DYING","WHAT DIMENSION IS THIS FROM","MY TONGUE IS HAVING A SEIZURE",
      "IT FROZE MY MOUTH THEN BURNED IT","I CAN SEE GOD AND HE'S DISGUSTED","THIS IS A CRIME AGAINST PHYSICS",
      "IT'S ALIVE AND IT HATES ME","MY STOMACH JUST FILED FOR DIVORCE"];
    t.react={e:'💀',q:abomReacts[Math.floor(Math.random()*abomReacts.length)],ok:correct};
  }
  let px=t.x*T+T,py=t.y*T;
  for(let i=0;i<14;i++){let a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;
    parts.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:35+Math.random()*18,ml:53,col:correct?'#ffd700':'#8b4513',sz:3+Math.random()*4})}
  addF(px,py-30,(correct?'':'WRONG! ')+(isAbom?'💀 ABOMINATION ':'')+'+'+pts+(combo>1?' x'+combo+'!':''),isAbom?'#ff00ff':correct?'#ffd700':'#ff4444',correct?20:15,70);
  if(tip>0)addF(px+30,py-8,'$'+tip+' TIP!','#69db7c',13,50);
  updHUD();
  setTimeout(()=>{
    t.cust=null;t.order=null;
    if(served>=toServe){st='done';sLvl();setTimeout(()=>showOvl('win'),400)}
    else setTimeout(()=>{if(st==='playing'){let em=tables.filter(tt=>!tt.cust);if(em.length>0)spawnC(em[Math.floor(Math.random()*em.length)])}},800);
  },2200);
}

  }
}
function hitAct(cx,cy){
  let ab=actBtnRect,dx=cx-(ab.x+ab.w/2),dy=cy-(ab.y+ab.h/2);
  return dx*dx+dy*dy<(ab.w/2+12)*(ab.h/2+12);
}
C.addEventListener('touchstart',e=>{
  e.preventDefault();aOn();
  if(st!=='playing')return;
  let t=e.changedTouches[0];
  let r=C.getBoundingClientRect();
  let cx=t.clientX-r.left,cy=t.clientY-r.top;
  // Check ACT button first
  if(hitAct(cx,cy)){
    if(pl.y<=6)openCook();
    else if(pl.carry)tryServe();
    return;
  }
  // Tap to move: convert screen coords to tile coords
  let tx=(cx+cam.x)/T,ty=(cy+cam.y)/T;
  // If carrying and tapped near a table with a customer, auto-serve when we arrive
  tapTarget={x:tx,y:ty,autoServe:!!pl.carry};
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault()},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault()},{passive:false});
// Also support click for desktop testing
C.addEventListener('click',e=>{
  if(st!=='playing'||!mobile)return;
  let r=C.getBoundingClientRect();
  let cx=e.clientX-r.left,cy=e.clientY-r.top;
  if(hitAct(cx,cy)){
    if(pl.y<=6)openCook();
    else if(pl.carry)tryServe();
    return;
  }
  let tx2=(cx+cam.x)/T,ty2=(cy+cam.y)/T;
  tapTarget={x:tx2,y:ty2,autoServe:!!pl.carry};
});

function drawFloor(){

    let px=c*T-cam.x,py=r*T-cam.y;
    if(px>W+T||py>H+T||px<-T||py<-T)continue;
    let col;
    if(r<5)col=(c+r)%2?'#4a3020':'#3a2518'; // kitchen
    else if(r===5)col='#6b4226'; // counter
    else if(r<8)col=(c+r)%2?'#352418':'#2a1a10'; // bar
    else if(r<21)col=(c+r)%2?'#2a1a0f':'#221510'; // dining
    else if(r<23)col='#1a1210'; // hall
    else col=(c+r)%2?'#1a2a1a':'#152515'; // patio (greenish)
    X.fillStyle=col;X.fillRect(px,py,T+1,T+1);
  }
  // Walls and features
  let cy=5*T-cam.y;
  X.fillStyle='#8B4513';X.fillRect(-cam.x,cy,COLS*T,T);
  X.fillStyle='#A0522D';X.fillRect(-cam.x,cy+3,COLS*T,4);
  let dl=Math.floor(COLS/2)-1,dr=Math.floor(COLS/2)+1;
  X.fillStyle='#352010';X.fillRect(dl*T-cam.x,cy,(dr-dl+1)*T,T);
  X.fillStyle='#ffd700';X.font='bold 13px monospace';X.textAlign='center';

  X.fillStyle='#444';X.fillRect(1*T-cam.x,.3*T-cam.y,3*T,2.5*T);
  X.fillStyle='#555';X.fillRect((COLS-4)*T-cam.x,.3*T-cam.y,3*T,2.5*T);
  X.fillStyle='#5a3a1a';X.fillRect(Math.floor(COLS/2)*T-T-cam.x,.5*T-cam.y,T*2,T*2);
  X.strokeStyle='#8B6914';X.lineWidth=2;X.strokeRect(Math.floor(COLS/2)*T-T-cam.x,.5*T-cam.y,T*2,T*2);
  X.fillStyle='#ffd700';X.font='bold 10px monospace';
  X.fillText('🔥 STOVE',2.5*T-cam.x,2*T-cam.y);
  X.fillText('🧊 FRIDGE',(COLS-2.5)*T-cam.x,2*T-cam.y);
  X.fillText('🍽️ PREP',Math.floor(COLS/2)*T-cam.x,2.2*T-cam.y);

  // Bar counter
  X.fillStyle='#6b4226';X.fillRect(1*T-cam.x,6*T-cam.y,6*T,T);
  X.fillStyle='#8B4513';X.fillRect(1*T-cam.x,6*T-cam.y+2,6*T,4);
  X.fillStyle='#a08060';X.font='9px monospace';X.fillText('BAR',4*T-cam.x,6.6*T-cam.y);

function drawTable(t){
  let px=t.x*T-cam.x,py=t.y*T-cam.y;
  if(px>W+T*3||py>H+T*3||px<-T*3||py<-T*3)return;
  // Table
  X.fillStyle='#8B6914';X.fillRect(px+3,py+6,t.w*T-6,T-10);
  X.strokeStyle='#6B4914';X.lineWidth=2;X.strokeRect(px+3,py+6,t.w*T-6,T-10);
  // Chairs
  X.fillStyle='#A0522D';
  X.fillRect(px+T*.15,py-T*.4,T*.55,T*.35);
  if(t.w>1)X.fillRect(px+T*1.15,py-T*.4,T*.55,T*.35);

  if(!t.cust)return;
  // Draw pixel art customer
  let cx2=px+T,cy2=py-T*.7;
  // Recolor palette for this customer
  let cpal={...PAL,'H':t.cust.hair,'U':t.cust.shirt,'u':t.cust.shirt};
  let oldPAL={...PAL};Object.assign(PAL,cpal);
  drawPx(SPR_CUST,cx2-SPR_CUST[0].length*P/2,cy2,false);
  Object.assign(PAL,oldPAL);
  // Name
  X.fillStyle='#a08060';X.font='bold 9px monospace';X.textAlign='center';
  X.fillText(t.cust.n,cx2,py+T+16);
  // Order bubble
  if(!t.svd&&t.order){
    let bx=cx2+T*.6,by=cy2-T*.3;
    X.fillStyle='rgba(255,245,220,.92)';X.beginPath();
    X.roundRect(bx-T*.55,by-T*.2,T*1.1,T*.5,8);X.fill();
    X.strokeStyle='#8B4513';X.lineWidth=1.5;X.stroke();
    X.font='14px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillStyle='#000';
    X.fillText(t.order.emojis.substring(0,6),bx,by+T*.05);
    // Patience bar
    let pct=t.order.patience/t.order.maxP;
    X.fillStyle='#222';X.fillRect(px+4,py+T+2,t.w*T-8,5);
    X.fillStyle=pct>.5?'#69db7c':pct>.25?'#ffa94d':'#ff4444';
    X.fillRect(px+4,py+T+2,(t.w*T-8)*pct,5);
    // Stink from waiting customer
    if(pct<.5)drawStink(cx2,cy2-T*.2,T*.6,fr,.2);
  }
  // Reaction
  if(t.react&&t.rt>0){
    let a=Math.min(t.rt/40,1);X.globalAlpha=a;
    X.font=`${30+Math.sin(fr*.2)*3}px sans-serif`;X.textAlign='center';
    X.fillText(t.react.e,cx2,cy2-T*.5-Math.sin(fr*.07)*5);
    X.font='bold 10px monospace';X.fillStyle=t.react.ok?'#ffd700':'#ff4444';
    X.fillText(t.react.q.substring(0,26),cx2,cy2-T*1);
    X.globalAlpha=1;
  }
}

function drawPlayer(){

// ===== UPDATE =====
function update(){
  if(st==='cooking'||st!=='playing')return;
  fr++;
  // Movement
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']||dp.u)dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']||dp.d)dy=1;
  if(keys['ArrowLeft']||keys['a']||keys['A']||dp.l)dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']||dp.r)dx=1;
  // Tap-to-move
  if(tapTarget&&dx===0&&dy===0){
    let tdx=tapTarget.x-pl.x,tdy=tapTarget.y-pl.y;
    let dist=Math.hypot(tdx,tdy);
    if(dist<.15){
      let wasAutoServe=tapTarget.autoServe;
      tapTarget=null;
      // Auto-serve if we tapped near a table while carrying
      if(wasAutoServe&&pl.carry){tryServe()}
      // Auto-cook if in kitchen (even if carrying, for re-cook/BOTH mode)
      else if(pl.y<=6){openCook()}
    }
    else{
      let nd=1/dist;dx=tdx*nd;dy=tdy*nd;
    }
  }else if(dx!==0||dy!==0){tapTarget=null} // keyboard cancels tap target
  pl.mv=dx!==0||dy!==0;
  if(pl.mv){
    if(Math.abs(dy)>Math.abs(dx)){if(dy<0)pl.dir=0;else pl.dir=2}else{if(dx>0)pl.dir=1;else pl.dir=3}
    let s=SPD/T;
    let nx=pl.x+dx*s,ny=pl.y+dy*s;
    if(walk(nx,pl.y))pl.x=nx;else if(tapTarget)tapTarget=null;
    if(walk(pl.x,ny))pl.y=ny;else if(tapTarget)tapTarget=null;
    pl.x=Math.max(.3,Math.min(COLS-.7,pl.x));pl.y=Math.max(.3,Math.min(ROWS-.7,pl.y));
    if(fr%12===0)sStep();pl.anim++;
  }
  // Camera
  cam.x=pl.x*T-W/2+T/2;cam.y=pl.y*T-H/2+T/2;
  cam.x=Math.max(0,Math.min(MAPW-W,cam.x));cam.y=Math.max(0,Math.min(MAPH-H,cam.y));
  // Patience + chatter
  for(let t of tables){
    if(t.cust&&!t.svd&&t.order){
      t.order.patience-=1;
      t.ct--;
      if(t.ct<=0){spawnChat(t);t.ct=lcfg(lvl).chatR+Math.floor(Math.random()*180)}
    }
    if(t.rt>0)t.rt--;
  }
  // Timeouts
  if(fr%60===0){
    for(let t of tables){
      if(t.cust&&!t.svd&&t.order&&t.order.patience<=0){
        t.svd=true;served++;combo=0;
        t.react={e:'😤',q:'I AM LEAVING!',ok:false};t.rt=90;
        sGO();addF(t.x*T+T,t.y*T-10,'CUSTOMER LEFT!','#ff0000',16,60);
        setTimeout(()=>{t.cust=null;t.order=null;
          if(served>=toServe){st='done';sLvl();setTimeout(()=>showOvl('win'),400)}
          else{let em=tables.filter(tt=>!tt.cust);if(em.length>0)spawnC(em[Math.floor(Math.random()*em.length)])}
        },1800);
      }
    }
  }
  // Events
  if(fr%lcfg(lvl).evRate===0)spawnEvt();
  // Particles
  for(let i=parts.length-1;i>=0;i--){let p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life--;if(p.life<=0)parts.splice(i,1)}
  for(let i=floats.length-1;i>=0;i--){floats[i].y-=.5;floats[i].life--;if(floats[i].life<=0)floats.splice(i,1)}
  updHUD();
}

// ===== RENDER =====
function render(){
  X.fillStyle='#0a0505';X.fillRect(0,0,W,H);
  if(st==='menu')return;
  drawFloor();
  for(let o of obs)drawObs(o);
  for(let t of tables)drawTable(t);
  drawEvts();
  drawWaitress();
  drawPlayer();
  drawParts();drawFloats();drawChats();drawZoneLabel();
  // Prompts
  if(st==='playing'&&pl.y<=6&&!pl.carry){
    if(Math.sin(fr*.08)>0){X.fillStyle='rgba(255,215,0,.85)';X.font='bold 15px monospace';X.textAlign='center';X.fillText(mobile?'TAP COOK BUTTON!':'PRESS SPACE TO COOK!',W/2,H*.35)}
  }
  if(pl.carry&&st==='playing'){
    let near=tables.some(t=>t.cust&&!t.svd&&Math.hypot(pl.x-(t.x+1),pl.y-t.y)<2.8);
    if(near&&Math.sin(fr*.1)>0){X.fillStyle='rgba(255,215,0,.85)';X.font='bold 15px monospace';X.textAlign='center';X.fillText(mobile?'TAP SERVE BUTTON!':'PRESS SPACE TO SERVE!',W/2,H*.6)}
  }
  drawTapUI();
}

// ===== LOOP =====
function loop(){update();render();requestAnimationFrame(loop)}
resize();showOvl('menu');
loop();
})();
</script>
